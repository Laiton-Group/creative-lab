<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>asteroids · laiton</title>
<style>
body{margin:0;background:#0a0a0f;display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;overflow:hidden;font-family:monospace}
canvas{border:1px solid #1a3a2a;border-radius:8px;background:#0d0d14}
#info{color:#666;font-size:12px;margin-top:12px;letter-spacing:2px}
#info span{color:#00d4aa}
</style>
</head>
<body>
<canvas id="c" width="600" height="400"></canvas>
<div id="info"><span>← →</span> bouger <span>↑</span> tirer · <span id="score">0</span></div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d')
let ship={x:300,y:350,angle:-Math.PI/2,vx:0,vy:0,bullets:[],lastShot:0}
let asteroids=[],score=0,keys={}
for(let i=0;i<4;i++)asteroids.push({x:Math.random()*600,y:Math.random()*200,r:25+Math.random()*20,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,rot:Math.random()*6,verts:Math.floor(Math.random()*4+6)})
document.onkeydown=e=>{keys[e.key]=1;if(e.key==='ArrowUp')shoot()}
document.onkeyup=e=>{keys[e.key]=0}
function shoot(){
  const now=Date.now()
  if(now-ship.lastShot<200)return
  ship.lastShot=now
  ship.bullets.push({x:ship.x,y:ship.y,vx:Math.cos(ship.angle)*6,vy:Math.sin(ship.angle)*6,life:60})
}
function game(){
  ctx.clearRect(0,0,600,400)
  if(keys['ArrowLeft'])ship.angle-=.05
  if(keys['ArrowRight'])ship.angle+=.05
  ship.x+=ship.vx;ship.y+=ship.vy
  ship.vx*=.98;ship.vy*=.98
  if(ship.x<0)ship.x=600;if(ship.x>600)ship.x=0
  if(ship.y<0)ship.y=0;if(ship.y>400)ship.y=400
  ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle)
  ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(-10,-8);ctx.lineTo(-6,0);ctx.lineTo(-10,8);ctx.closePath()
  ctx.strokeStyle='#00d4aa';ctx.stroke();ctx.restore()
  ship.bullets=ship.bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fillStyle='#00d4aa';ctx.fill();return b.life>0&&b.x>0&&b.x<600&&b.y>0&&b.y<400})
  asteroids=asteroids.filter(a=>{
    a.x+=a.vx;a.y+=a.vy
    if(a.x<0)a.x=600;if(a.x>600)a.x=0
    if(a.y<0)a.y=400;if(a.y>400)a.y=0
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot+=.01)
    ctx.beginPath()
    for(let i=0;i<a.verts;i++){const ang=i/a.verts*Math.PI*2;const r=i%2==0?a.r:a.r*.6;ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r)}
    ctx.closePath();ctx.strokeStyle='#555';ctx.lineWidth=2;ctx.stroke();ctx.restore()
    let hit=false
    ship.bullets.forEach(b=>{const dx=a.x-b.x,dy=a.y-b.y;if(Math.sqrt(dx*dx+dy*dy)<a.r){hit=true}})
    if(hit){
      if(a.r>15){
        for(let i=0;i<2;i++)asteroids.push({x:a.x,y:a.y,r:a.r*.5,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,rot:0,verts:Math.floor(Math.random()*4+6)})
      }
      score+=10;document.getElementById('score').textContent=score
      return false
    }
    return true
  })
  if(asteroids.length<3)for(let i=0;i<2;i++)asteroids.push({x:Math.random()*600,y:-20,r:20+Math.random()*15,vx:(Math.random()-.5)*2,vy:Math.random()*2+1,rot:0,verts:Math.floor(Math.random()*4+6)})
  requestAnimationFrame(game)
}
game()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>igloo.ink</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+Pro:wght@300;400;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#161616;color:#fff;font-family:'Source Sans Pro',sans-serif;overflow:hidden;height:100vh}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.6}
.content{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:24px 32px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#fff;letter-spacing:1px;text-decoration:none}
nav a{color:#7f8080;margin-left:24px;text-decoration:none;font-size:14px;letter-spacing:.071em;font-weight:400;transition:.2s;text-transform:uppercase}
nav a:hover{color:#f7f7f7}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 20px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(40px,8vw,80px);font-weight:400;color:#fff;margin-bottom:8px;letter-spacing:2px}
.hero .sub{font-family:'Montserrat',sans-serif;font-size:clamp(14px,2.5vw,22px);font-weight:600;color:#7f8080;letter-spacing:6px;text-transform:uppercase;margin-bottom:40px}
.hero p{color:#a4a4a4;font-size:16px;max-width:500px;line-height:1.6;margin-bottom:32px;font-weight:300}
.form{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;width:100%;max-width:440px}
.form input{flex:1;min-width:200px;padding:16px 20px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:16px;font-family:'Source Sans Pro',sans-serif;outline:none;transition:.2s}
.form input:focus{border-color:#fff}
.form input::placeholder{color:#7f8080}
.form button{padding:16px 32px;border-radius:4px;border:none;background:#fff;color:#000;font-family:'Montserrat',sans-serif;font-weight:700;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:.2s}
.form button:hover{background:#e9e9e9;transform:translateY(-1px)}
footer{text-align:center;padding:32px;color:#555;font-size:12px;letter-spacing:2px;border-top:1px solid rgba(255,255,255,.04)}
footer a{color:#a9a9a9;text-decoration:none}
footer a:hover{color:#fff}
.privacy{font-size:12px;color:#666;margin-top:12px}
.privacy a{color:#a9a9a9}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="content">
  <header>
    <a href="/" class="logo">igloo.ink</a>
    <nav>
      <a href="#">work</a>
      <a href="#">about</a>
      <a href="#">contact</a>
    </nav>
  </header>
  <section class="hero">
    <h1>Igloo Ink</h1>
    <div class="sub">Launching Soon</div>
    <p>We're crafting something new. Leave your email and we'll let you know when the igloo opens.</p>
    <form class="form" onsubmit="event.preventDefault();alert('Thanks! We will notify you.');this.reset()">
      <input type="email" placeholder="Email" required>
      <button type="submit">Subscribe</button>
    </form>
  </section>
  <footer>
    <a href="#">Instagram</a> · <a href="#">Twitter</a> · <a href="#">info@igloo.ink</a><br>
    <span style="color:#555;font-size:11px;display:block;margin-top:8px">&copy; 2026 Igloo Ink — All Rights Reserved</span>
  </footer>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const c=document.getElementById('bg')
const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)
const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2))
c.appendChild(renderer.domElement)

const count=80
const pos=new Float32Array(count*3)
const vel=[]
for(let i=0;i<count;i++){
  const t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1), r=5+Math.random()*8
  pos[i*3]=Math.sin(p)*Math.cos(t)*r
  pos[i*3+1]=Math.sin(p)*Math.sin(t)*r
  pos[i*3+2]=Math.cos(p)*r
  vel.push({x:(Math.random()-.5)*.003,y:(Math.random()-.5)*.003,z:(Math.random()-.5)*.003})
}
const geo=new THREE.BufferGeometry()
geo.setAttribute('position',new THREE.BufferAttribute(pos,3))
const mat=new THREE.PointsMaterial({color:0xffffff,size:.06,transparent:true,opacity:.6,blending:THREE.AdditiveBlending})
const pts=new THREE.Points(geo,mat)
scene.add(pts)

const lineMat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.04,blending:THREE.AdditiveBlending})
let lineGeo=null,lineSys=null

function updateLines(){
  const p=pts.geometry.attributes.position.array
  const pairs=[]
  for(let i=0;i<count;i++)for(let j=i+1;j<count;j++){
    const dx=p[i*3]-p[j*3],dy=p[i*3+1]-p[j*3+1],dz=p[i*3+2]-p[j*3+2],d=Math.sqrt(dx*dx+dy*dy+dz*dz)
    if(d<2.8)pairs.push({i,j,a:1-d/2.8})
  }
  if(lineGeo){scene.remove(lineSys);lineGeo.dispose()}
  if(!pairs.length)return
  const v=[]
  pairs.forEach(x=>{v.push(p[x.i*3],p[x.i*3+1],p[x.i*3+2],p[x.j*3],p[x.j*3+1],p[x.j*3+2])})
  lineGeo=new THREE.BufferGeometry()
  lineGeo.setAttribute('position',new THREE.Float32BufferAttribute(v,3))
  lineSys=new THREE.LineSegments(lineGeo,lineMat)
  scene.add(lineSys)
}

let mx=0,my=0
document.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth)*2-1;my=-(e.clientY/window.innerHeight)*2+1})

camera.position.z=14
function animate(){
  requestAnimationFrame(animate)
  const p=pts.geometry.attributes.position.array
  for(let i=0;i<count;i++){
    p[i*3]+=vel[i].x;p[i*3+1]+=vel[i].y;p[i*3+2]+=vel[i].z
    const r=Math.sqrt(p[i*3]**2+p[i*3+1]**2+p[i*3+2]**2)
    if(r>15||r<3){vel[i].x*=-1;vel[i].y*=-1;vel[i].z*=-1}
  }
  pts.geometry.attributes.position.needsUpdate=true
  updateLines()
  scene.rotation.x+=(my*.3-scene.rotation.x)*.02
  scene.rotation.y+=(mx*.5-scene.rotation.y)*.02
  renderer.render(scene,camera)
}
animate()
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)})
</script>
</body>
</html>
